[package]
authors      = ["Reverier-Xu <reverier.xu@woooo.tech>"]
edition      = "2024"
name         = "wxtla"
readme       = "README.md"
rust-version = "1.93.1"
version      = "0.0.2"

description = "Wired eXploring Target Layer Accessor"
license     = "AGPL-3.0-only"

[profile.release]
codegen-units = 1
lto           = "thin"
opt-level     = 3
strip         = true


[dependencies]
adler2    = "2.0"
crc32fast = "1.5"
crc32c    = "0.6"
flate2    = "1.1"
inventory = "0.3"
thiserror = "2.0"
zstd      = "0.13"

[dev-dependencies]
md5 = "0.8"
